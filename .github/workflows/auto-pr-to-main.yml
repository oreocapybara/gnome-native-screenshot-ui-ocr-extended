name: Auto PR to Main

on:
  push:
    branches:
      - dev

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create auto-pr --color 0E8A16 --description "Automatically created by workflow" --force
          gh label create release --color 0E8A16 --description "Automatically created by workflow" --force
          echo "Labels are ready"

      - name: Create Release Pull Request to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if a PR already exists for dev → main
          EXISTING_PR=$(gh pr list --head dev --base main --json number --jq '.[0].number')

          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists for dev → main, it will be updated automatically"
          else
            gh pr create \
              --base main \
              --head dev \
              --title "Release: merge dev into main" \
              --body "Automated release PR to merge \`dev\` into \`main\`.

          This PR was created because new changes were merged into \`dev\`.

          ---
          *This PR was created automatically by GitHub Actions.*" \
              --label "release,auto-pr"
            echo "Created release PR for dev → main"
          fi
